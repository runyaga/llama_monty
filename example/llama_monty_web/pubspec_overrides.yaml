dependency_overrides:
  # Forked llamadart with the WebGPU grammar-drop workaround applied.
  # See patches/README.md for the rationale; the upstream issue is the
  # WebGPU C++ sampler aborting when enforcing tool-call GBNF grammars.
  llamadart:
    git:
      url: https://github.com/runyaga/llamadart.git
      ref: fix/web-grammar-drop

  # Switch to a local checkout when iterating on the fork:
  # llamadart:
  #   path: /Users/runyaga/dev/llamadart
