name: llama_monty
description: Local LLM inference callable from the Monty Python sandbox — bridges llamadart and dart_monty_core.
version: 0.1.0
repository: https://github.com/runyaga/llama_monty
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  dart_monty:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: chore/monty-0.0.12-upgrade
  ffi: ^2.1.0
  llamadart: ^0.6.10
  meta: ^1.9.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
  very_good_analysis: ^10.0.0
