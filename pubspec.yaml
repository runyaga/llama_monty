name: llama_monty
description: Local LLM inference callable from the Monty Python sandbox — bridges llamadart and dart_monty_core.
version: 0.1.0
repository: https://github.com/runyaga/llama_monty
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  dart_monty: ^0.17.1
  llamadart: ^0.6.11
  meta: ^1.9.0
  # wasmtime-spike's cross-backend WASM host. Powers the bash
  # competence battery under example/eval/bash/ and the run_bash
  # host fn registration in the web app. Path-dep until the upstream
  # package publishes; see ~/.claude/plans/twinkling-imagining-reddy.md.
  wasm_host_dart:
    path: ../wasmtime-spike/dart

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
  very_good_analysis: ^10.0.0
  web: ^1.1.0
